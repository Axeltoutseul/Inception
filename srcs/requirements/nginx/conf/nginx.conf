events {}

http {
    server {

        include /etc/nginx/mime.types;
        listen 443 ssl;
        server_name axbaudri.42.fr;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificates /etc/nginx/ssl/nginx.crt;
        ssl_certificates_key /etc/nginx/ssl/nginx.key;

        location / {
            proxy_pass http://127.0.0.1:3000
            root /var/www/html;
            index index.html;
        }
    }
}