services:

  db:
    build: ./requirements/mariadb/.
    container_name: inception_db
    volumes:
      - /home/axbaudri/data/mariadb:/var/lib/mysql
    networks:
      - app-network
    env_file: .env
    restart: always

  wordpress:
    build: ./requirements/wordpress/.
    depends_on:
      - db
    container_name: inception_wp
    expose:
      - '9000'
    volumes:
      - /home/axbaudri/data/wordpress:/var/www/html
    networks:
      - app-network
    env_file: .env
    restart: always

  nginx:
    build: ./requirements/nginx/.
    depends_on:
      - wordpress
    container_name: inception_nginx
    ports:
      - '443:443'
      - '8080:80'
    volumes:
      - ./requirements/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/axbaudri/data/wordpress:/var/www/html
    networks:
      - app-network
    env_file: .env
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  wp_data: