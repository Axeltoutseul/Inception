services:

  db:
    build: ./requirements/mariadb/.
    image: mariadb:42
    container_name: mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network
    env_file: .env
    restart: always

  wordpress:
    build: ./requirements/wordpress/.
    image: wordpress:42
    depends_on:
      - db
    container_name: wordpress
    expose:
      - '9000'
    volumes:
      - wp_data:/var/www/html
    networks:
      - app-network
    env_file: .env
    restart: always

  nginx:
    build: ./requirements/nginx/.
    image: nginx:42
    depends_on:
      - wordpress
    container_name: nginx
    ports:
      - '443:443'
    volumes:
      # - ./requirements/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - wp_data:/var/www/html
    networks:
      - app-network
    env_file: .env
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  wp_data:
    driver_opts:
      type: none
      device: /home/axbaudri/data/wordpress 
      o: bind

  mariadb_data:
    driver_opts:
      type: none
      device: /home/axbaudri/data/mariadb
      o: bind