services:

  db:
    build: ./requirements/mariadb/.
    container_name: inception_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    env_file: .env
    restart: always

  wordpress:
    build: ./requirements/wordpress/.
    depends_on:
      - db
    container_name: inception_wp
    expose:
      - '9000'
    volumes:
      - .wp_data:/var/www/html
    networks:
      - app-network
    env_file: .env
    restart: always

  nginx:
    build: ./requirements/nginx/.
    depends_on:
      - wordpress
    container_name: inception_nginx
    ports:
      - '8443:443'
    volumes:
      - ./requirements/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - wp_data:/var/www/html
    networks:
      - app-network
    env_file: .env
    restart: always

networks:
  app-network:

volumes:
  db_data:
  wp_data: